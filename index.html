<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metaosmose — Shop My Finds</title>
<style>
  :root{ color-scheme: light; --bg:#0f0f17; --card:#1c1c2b; --accent:#6c63ff; --text:#f2f2f7; --muted:#a0a0b8; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(160deg,#0f0f17,#1a1430);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:32px 18px;}
  .page{width:100%;max-width:480px;}
  .avatar{width:84px;height:84px;border-radius:50%;margin:0 auto 14px;background:linear-gradient(135deg,#6c63ff,#b06cff);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#fff;}
  h1{text-align:center;font-size:21px;font-weight:700;}
  .bio{text-align:center;color:var(--muted);font-size:14px;margin:6px 0 22px;line-height:1.5;}
  .section{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:22px 4px 10px;font-weight:600;}
  a.btn{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid #2a2a40;border-radius:14px;padding:15px 16px;margin-bottom:12px;text-decoration:none;color:var(--text);font-weight:600;font-size:15px;transition:transform .12s ease,border-color .12s ease;}
  a.btn:hover{transform:translateY(-2px);border-color:var(--accent);}
  .btn .emoji{font-size:20px;width:26px;text-align:center;flex:none;}
  .btn .label{flex:1;}
  .btn .chev{color:var(--muted);font-size:18px;}
  .foot{text-align:center;color:var(--muted);font-size:11px;margin-top:26px;line-height:1.6;}
  .disc{font-size:10px;color:#6b6b86;margin-top:8px;}
</style>
</head>
<body>
  <div class="page">

    </a>

    <div class="foot">
      Updated weekly · powered by my content engine

    </div>
  </div>
</body>
</html>
